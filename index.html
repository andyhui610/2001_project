<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《2001 太空漫遊》逐幀視聽語言寫作儀表板</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Custom Style -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- HEADER -->
        <header class="app-header">
            <div class="header-logo">
                <i class="fa-solid fa-circle-nodes logo-icon"></i>
                <div class="logo-text">
                    <h1>2001: A Space Odyssey</h1>
                    <span>逐幀視聽語言與劇本分析寫作系統</span>
                </div>
            </div>
            <div class="header-status">
                <span id="save-status"><i class="fa-solid fa-cloud-arrow-up"></i> 系統就緒</span>
            </div>
        </header>

        <!-- MAIN CONTENT AREA -->
        <div class="app-body">
            <!-- SIDEBAR: SHOT NAVIGATION -->
            <aside class="sidebar">
                <div class="sidebar-search">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="search-input" placeholder="搜尋鏡頭編號或關鍵字...">
                </div>
                
                <div class="sidebar-filter">
                    <label for="sequence-select"><i class="fa-solid fa-bars-staggered"></i> 段落選擇</label>
                    <select id="sequence-select">
                        <option value="all">全部鏡頭 (1 - 643)</option>
                        <option value="part1_all">第一部分：人類的黎明 (1 - 82)</option>
                        <option value="part2_all">第二部分：太空飛行與空間站 (83 - 130)</option>
                        <option value="part2_base">第二部分：月球基地與前哨站 (131 - 195)</option>
                        <option value="part2_tma">第二部分：TMA-1 石碑挖掘 (196 - 226)</option>
                        <option value="part3_discovery">第三部分：發現號太空艙與冬眠區 (227 - 266)</option>
                        <option value="part3_eva">第三部分：EVA 維修與 Poole 之死 (267 - 380)</option>
                        <option value="part3_hal">第三部分：關閉 HAL 9000 (381 - 450)</option>
                        <option value="part3_stargate">第三部分：星門與星童 (451 - 643)</option>
                    </select>
                </div>

                <div class="shot-list" id="shot-list">
                    <!-- Shot items will be generated by JS -->
                    <div class="loading-spinner"><i class="fa-solid fa-spinner fa-spin"></i> 載入鏡頭列表中...</div>
                </div>
            </aside>

            <!-- WORKSPACE: STORYBOARD & SCREENPLAY -->
            <main class="workspace">
                <!-- SHOT DETAILS BANNER -->
                <div class="shot-banner">
                    <div class="banner-title-row">
                        <h2 id="current-shot-title">鏡頭 #--</h2>
                        <span id="current-shot-seq" class="badge">讀取中...</span>
                    </div>
                    <div class="banner-meta-row">
                        <span><i class="fa-regular fa-clock"></i> 時間軸: <strong id="current-shot-timecode">--:--:--</strong></span>
                        <span><i class="fa-solid fa-hourglass-half"></i> 長度: <strong id="current-shot-duration">--s</strong></span>
                    </div>
                </div>

                <!-- STORYBOARD CAROUSEL/GRID -->
                <div class="storyboard-section">
                    <h3 class="section-title"><i class="fa-regular fa-image"></i> Storyboard 影格 (每鏡頭 3 幀)</h3>
                    <div class="frames-grid" id="frames-grid">
                        <!-- 3 frame images will be inserted here -->
                        <div class="frame-card-placeholder"></div>
                        <div class="frame-card-placeholder"></div>
                        <div class="frame-card-placeholder"></div>
                    </div>
                </div>

                <!-- SCREENPLAY CONTEXT -->
                <div class="screenplay-section">
                    <div class="screenplay-header">
                        <h3 class="section-title"><i class="fa-solid fa-file-lines"></i> 劇本對照 (第 <span id="script-page-range">--</span> 頁)</h3>
                        <div class="script-nav-buttons">
                            <button id="btn-prev-page" class="btn-icon" title="前一頁"><i class="fa-solid fa-chevron-left"></i></button>
                            <button id="btn-next-page" class="btn-icon" title="後一頁"><i class="fa-solid fa-chevron-right"></i></button>
                        </div>
                    </div>
                    <div class="screenplay-box" id="screenplay-box">
                        <div class="script-placeholder">載入劇本文字中...</div>
                    </div>
                </div>
            </main>

            <!-- EDITOR: ANALYSIS WRITING -->
            <section class="editor-panel">
                <div class="editor-header">
                    <div class="tab-buttons">
                        <button class="tab-btn active" id="tab-write"><i class="fa-solid fa-pen-nib"></i> 分析寫作</button>
                        <button class="tab-btn" id="tab-preview"><i class="fa-solid fa-eye"></i> 即時預覽</button>
                    </div>
                    <div class="editor-actions">
                        <button id="btn-insert-template" class="btn-secondary" title="插入視聽語言分析模板"><i class="fa-solid fa-wand-magic-sparkles"></i> 載入模板</button>
                        <button id="btn-save" class="btn-primary"><i class="fa-solid fa-save"></i> 儲存筆記</button>
                    </div>
                </div>

                <div class="editor-content-area">
                    <!-- Write tab -->
                    <div class="editor-textarea-wrapper" id="editor-write-wrapper">
                        <textarea id="note-textarea" placeholder="在這裡寫下您的視聽語言逐幀分析筆記... (支援 Markdown 語法)"></textarea>
                    </div>

                    <!-- Preview tab -->
                    <div class="editor-preview-wrapper hidden" id="editor-preview-wrapper">
                        <div class="markdown-body" id="preview-content">
                            <!-- Rendered Markdown goes here -->
                            <p class="preview-placeholder">您的分析預覽會在這裡顯示...</p>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- LIGHTBOX MODAL FOR IMAGE ZOOM -->
    <div class="lightbox-modal" id="lightbox-modal">
        <span class="lightbox-close" id="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
        <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>
</html>
